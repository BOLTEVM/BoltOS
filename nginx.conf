user nginx;
worker_processes auto;
error_log /tmp/error.log warn;
pid /tmp/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Mask version signature
    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /tmp/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # Gzip compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    server {
        # Listen on non-privileged port
        listen 8080;
        server_name localhost;

        root /usr/share/nginx/html;
        index index.html;

        # Cache static assets aggressively
        location ~* \.(?:ico|css|js|gif|jpe?g|png|svg|woff2?|eot|ttf|otf)$ {
            expires 6M;
            access_log off;
            add_header Cache-Control "public, max-age=15552000, immutable";
        }

        # Single Page Application routing fallback
        location / {
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
            
            # Security headers
            add_header X-Frame-Options "SAMEORIGIN" always;
            add_header X-XSS-Protection "1; mode=block" always;
            add_header X-Content-Type-Options "nosniff" always;
            add_header Referrer-Policy "no-referrer-when-downgrade" always;
            
            # Strict Content Security Policy (CSP) including public APIs, RPCs, and local mining substrates
            add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self' http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:* https://*.li.quest https://api.lifi.gateway.fm https://*.ninerealms.com https://*.thorchain.info https://api.1inch.dev https://hermes.pyth.network https://rpc.ankr.com https://rpc.pulsechain.com https://quaiscan.io https://rpc-evm-sidechain.xrpl.org https://rpc.bittorrentchain.io https://rpc.coredao.org https://sourcify.dev https://api.etherscan.io https://api.bscscan.com https://api.polygonscan.com https://api.scan.pulsechain.com https://openapi.coredao.org https://ipfs.io https://gateway.pinata.cloud https://cloudflare-ipfs.com https://dweb.link https://api.pinata.cloud https://blockstream.info https://*.infura.io https://*.alchemy.com https://*.ethers.io https://*.lifi.network; img-src 'self' data: https:; style-src 'self' 'unsafe-inline'; frame-src 'none';" always;
        }

        # Healthcheck endpoint
        location /health {
            access_log off;
            add_header Content-Type text/plain;
            return 200 'healthy';
        }

        # Error pages
        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
